name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build package and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$') {
            throw "Release tags must match vMAJOR.MINOR.PATCH, for example v0.1.0."
          }
          git fetch origin main:refs/remotes/origin/main --tags
          git merge-base --is-ancestor HEAD origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tags must point to a commit contained in origin/main."
          }
          $version = $tag.Substring(1)
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build, test, and package
        shell: pwsh
        run: .\scripts\package.ps1 -Version "${{ steps.version.outputs.version }}" -RequireStableTag

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.version }}"
          $zip = "artifacts/package/CursorMirror-$version-windows.zip"
          $sha = "$zip.sha256"
          gh release create $tag $zip $sha --title "Cursor Mirror $tag" --notes "Automated release for Cursor Mirror $tag."
